<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discan</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d1a;
      --surface: #16162a;
      --border: rgba(124, 58, 237, 0.25);
      --accent: #7c3aed;
      --accent-2: #a855f7;
      --accent-3: #38bdf8;
      --text: #e2e8f0;
      --muted: #8892a4;
      --radius: 1.25rem;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(124, 58, 237, 0.18) 0%, transparent 70%);
    }

    .hero {
      text-align: center;
      margin-bottom: 3.5rem;
      animation: fadeUp 0.7s ease both;
    }

    .hero h1 {
      font-size: clamp(4.5rem, 14vw, 9rem);
      font-weight: 900;
      background: linear-gradient(135deg, #7c3aed 0%, #a855f7 45%, #38bdf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -4px;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .hero p {
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      letter-spacing: 0.02em;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.25rem;
      width: 100%;
      max-width: 580px;
      animation: fadeUp 0.7s 0.15s ease both;
      opacity: 0;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2rem 1.75rem 1.75rem;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, rgba(124, 58, 237, 0.08), transparent 60%);
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: var(--accent-2);
      box-shadow: 0 20px 50px rgba(124, 58, 237, 0.22);
    }

    .card:hover::after { opacity: 1; }

    .card-icon {
      font-size: 2.75rem;
      margin-bottom: 0.5rem;
      line-height: 1;
    }

    .card h2 {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .card p {
      color: var(--muted);
      font-size: 0.875rem;
      line-height: 1.5;
      margin-bottom: 0.5rem;
    }

    .card-arrow {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.75rem;
      color: var(--accent-2);
      font-size: 0.875rem;
      font-weight: 600;
      transition: gap 0.2s ease;
    }

    .card:hover .card-arrow { gap: 0.6rem; }

    footer {
      margin-top: 3.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      opacity: 0.5;
      animation: fadeUp 0.7s 0.3s ease both;
      opacity: 0;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .lenny-wrap {
      margin-bottom: 2rem;
      animation: fadeUp 0.7s ease both;
    }

    .lenny-frame {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid var(--accent-2);
      box-shadow: 0 0 0 6px rgba(168, 85, 247, 0.15), 0 8px 30px rgba(124, 58, 237, 0.3);
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }

    .lenny-frame:hover {
      transform: scale(1.1) rotate(6deg);
      box-shadow: 0 0 0 8px rgba(168, 85, 247, 0.25), 0 16px 40px rgba(124, 58, 237, 0.45);
      border-color: var(--accent-3);
    }

    .lenny-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .lenny-frame:hover img {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div class="lenny-wrap">
    <div class="lenny-frame">
      <img src="lenny.jpg" alt="Lenny" />
    </div>
  </div>

  <div class="hero">
    <h1>Discan</h1>
    <p>Discord-botens kontrollpanel</p>
  </div>

  <nav class="cards">
    <a href="onion.html" class="card">
      <div class="card-icon">&#129485;</div>
      <h2>Onion Score</h2>
      <p>Se användarnas Discord-tid och statistik</p>
      <span class="card-arrow">Öppna <span>&#8594;</span></span>
    </a>
    <a href="upload.html" class="card">
      <div class="card-icon">&#127925;</div>
      <h2>Ladda upp ljud</h2>
      <p>Lägg till nya MP3-filer till boten</p>
      <span class="card-arrow">Öppna <span>&#8594;</span></span>
    </a>
    <a href="budord.html" class="card">
      <div class="card-icon">&#128221;</div>
      <h2>Discans budord</h2>
      <p></p>
      <span class="card-arrow">Öppna <span>&#8594;</span></span>
    </a>
  </nav>

  <footer>Discan &copy; 2026</footer>
</body>
</html>
